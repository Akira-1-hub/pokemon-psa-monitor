name: Manual PSA Market Data Fetch (backup)

# 定期実行はローカルPC（auto_update.bat + タスクスケジューラ）で行うため
# ここでは cron を無効化し、手動実行のバックアップ用としてのみ残す。
on:
  workflow_dispatch:  # GitHub上から手動実行のみ

permissions:
  contents: write   # DBをコミット・プッシュするために必要

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # デフォルトの GITHUB_TOKEN で push するために fetch-depth を 1 に
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch market data
        run: python fetch.py

      - name: Export static JSON
        run: python export_json.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: weekly data update $(date -u +'%Y-%m-%d')"
            git push
          fi
